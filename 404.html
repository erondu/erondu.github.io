<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Page Not Found — Jared Erondu</title>
		<meta name="robots" content="noindex">
		<link rel="icon" href="img/favicon.svg" type="image/svg+xml">
		<link href="css/erondu.css" rel="stylesheet">
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-6L92N8Q9PF"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-6L92N8Q9PF');
		</script>
		<script>
			(function() {
				document.documentElement.classList.add('js');
				var saved = localStorage.getItem('theme');
				if (saved && saved !== 'system') document.documentElement.setAttribute('data-theme', saved);
			})();
		</script>
	</head>
	<body class="error-page">
		<main class="error-content">
			<h1 class="error-line"><span>Looks like a 404. This page wasn't found.</span></h1>
			<a class="error-home" href="/">Return home</a>
		</main>
		<script>
			(function () {
				var line = document.querySelector('.error-line span');
				var home = document.querySelector('.error-home');
				var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
				if (!line || !home || reduceMotion) {
					document.body.classList.add('error-complete');
					return;
				}
				var text = line.textContent;
				var index = 0;
				line.textContent = '';
				line.classList.add('terminal-typing');
				function type() {
					line.textContent = text.slice(0, index);
					index += 1;
					if (index <= text.length) {
						window.setTimeout(type, 42 + Math.random() * 28);
					} else {
						window.setTimeout(function () {
							document.body.classList.add('error-complete');
						}, 280);
					}
				}
				window.setTimeout(type, 180);
			})();
		</script>
	</body>
</html>
